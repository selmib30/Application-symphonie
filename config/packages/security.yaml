security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    firewalls:
        dev:
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false
        main:
            lazy: true
            provider: app_user_provider
            form_login:
                login_path: app_login
                check_path: app_login
                enable_csrf: true
                default_target_path: home
            logout:
                path: app_logout
                target: home

    access_control:
        - { path: ^/party, roles: ROLE_USER }
        - { path: ^/party/\d+/(join|leave), roles: ROLE_USER }
        - { path: ^/party/new, roles: ROLE_USER }
        - { path: ^/deconnexion, roles: ROLE_USER }
        - { path: ^/race, roles: ROLE_ADMIN }
        - { path: ^/character/class, roles: ROLE_ADMIN }
        - { path: ^/skill, roles: ROLE_ADMIN }

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10
